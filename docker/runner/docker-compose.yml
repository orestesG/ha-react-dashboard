services:
  runner:
    build:
      context: .
      args:
        RUNNER_VERSION: "2.317.0"
    environment:
      GITHUB_PAT:    ${GITHUB_PAT}
      GITHUB_OWNER:  ${GITHUB_OWNER}
      GITHUB_REPO:   ${GITHUB_REPO}
      RUNNER_NAME:   ${RUNNER_NAME:-docker-runner}
    volumes:
      - runner_work:/home/runner/_work
    restart: unless-stopped

volumes:
  runner_work:
