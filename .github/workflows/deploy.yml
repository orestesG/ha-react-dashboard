name: Deploy to Home Assistant

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build panel
        run: npm run build:panel

      - name: Deploy main.js to Home Assistant
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HA_HOST }}
          username: root
          key: ${{ secrets.HA_SSH_KEY }}
          port: ${{ secrets.HA_SSH_PORT }}
          source: dist/main.js
          target: /config/www/mi-dashboard/
          strip_components: 1
