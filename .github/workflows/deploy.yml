name: Deploy to Home Assistant

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build panel
        run: npm run build:panel

      - name: Copy main.js to Home Assistant
        run: |
          scp -P ${{ secrets.HA_SSH_PORT }} -i ${{ secrets.HA_SSH_KEY_PATH }} -o StrictHostKeyChecking=no dist/main.js root@${{ secrets.HA_HOST }}:/config/www/mi-dashboard/main.js
