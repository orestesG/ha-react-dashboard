name: Deploy Panel to Home Assistant

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Copy dashboard config
        shell: powershell
        run: |
          $src = "D:\HAReactDash-style-fixes\src\dashboard.config.ts"
          if (Test-Path $src) {
            Copy-Item $src "src\dashboard.config.ts" -Force
            Write-Host "✓ dashboard.config.ts copiado"
          } else {
            Copy-Item "src\dashboard.config.example.ts" "src\dashboard.config.ts" -Force
            Write-Host "⚠ Usando dashboard.config.example.ts (config real no encontrada en $src)"
          }

      - name: Build panel
        run: npm run build:panel

      - name: Copy to HA www directory
        shell: powershell
        env:
          HA_WWW: ${{ vars.HA_WWW_PATH }}
        run: |
          $dest = $env:HA_WWW
          if (-not $dest) { throw "Variable HA_WWW_PATH no configurada en el repo (Settings > Variables)" }
          if (-not (Test-Path $dest)) { New-Item -ItemType Directory -Path $dest -Force | Out-Null }
          Copy-Item dist\main.js "$dest\main.js" -Force
          Write-Host "✓ main.js copiado a $dest"
