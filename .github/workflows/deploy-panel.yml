name: Deploy Panel to Home Assistant

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Copy dashboard config
        shell: powershell
        run: |
          $src = "D:\HAReactDash-style-fixes\src\dashboard.config.ts"
          if (Test-Path $src) {
            Copy-Item $src "src\dashboard.config.ts" -Force
            Write-Host "OK: dashboard.config.ts copiado"
          } else {
            Copy-Item "src\dashboard.config.example.ts" "src\dashboard.config.ts" -Force
            Write-Host "WARN: usando dashboard.config.example.ts"
          }

      - name: Build panel
        run: npm run build:panel

      - name: Copy to HA and version module_url
        shell: powershell
        env:
          HA_WWW:      ${{ vars.HA_WWW_PATH }}
          SAMBA_USER:  ${{ secrets.SAMBA_USER }}
          SAMBA_PASS:  ${{ secrets.SAMBA_PASS }}
        run: |
          $dest = $env:HA_WWW
          if (-not $dest) { throw "Variable HA_WWW_PATH no configurada (Settings > Variables)" }
          $share = ($dest -split '\\' | Select-Object -First 4) -join '\'
          net use $share $env:SAMBA_PASS /user:$env:SAMBA_USER /persistent:no | Out-Null

          # Copy main.js
          if (-not (Test-Path $dest)) { New-Item -ItemType Directory -Path $dest -Force | Out-Null }
          Copy-Item dist\main.js "$dest\main.js" -Force
          Write-Host "OK: main.js copiado"

          # Update module_url in configuration.yaml with git SHA for cache busting
          $sha     = $env:GITHUB_SHA.Substring(0, 7)
          $cfgPath = "$share\configuration.yaml"
          $utf8    = [System.Text.UTF8Encoding]::new($false)
          $content = [System.IO.File]::ReadAllText($cfgPath, $utf8)
          $updated = $content -replace 'module_url: /local/mi-dashboard/main\.js(\?v=[a-f0-9]+)?', "module_url: /local/mi-dashboard/main.js?v=$sha"
          [System.IO.File]::WriteAllText($cfgPath, $updated, $utf8)
          Write-Host "OK: module_url actualizado a ?v=$sha"

          net use $share /delete | Out-Null

      - name: Reload HA config
        shell: powershell
        env:
          HA_URL:   ${{ secrets.HA_URL }}
          HA_TOKEN: ${{ secrets.HA_TOKEN }}
        run: |
          $headers = @{ Authorization = "Bearer $env:HA_TOKEN"; "Content-Type" = "application/json" }
          try {
            Invoke-RestMethod -Uri "$env:HA_URL/api/services/homeassistant/reload_all" -Method Post -Headers $headers -Body "{}" | Out-Null
            Write-Host "OK: HA config recargada"
          } catch {
            Write-Host "WARN: reload_all fallo - $($_.Exception.Message)"
          }
